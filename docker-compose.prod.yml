# Production stack — disk-conscious defaults for small VPS (~25GB)
# - One backend image shared by API + Celery (build once)
# - Alpine-based Redis; user data on named volumes (not in images)
# - Run `docker image prune` after deploy to drop old duplicate layers

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DEFAULT}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - datilio-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - datilio-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: datilio-backend:prod
    container_name: datilio-backend
    env_file:
      - .env
      - ./backend/.env
    environment:
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    ports:
      - "8000:8000"
    volumes:
      - user_uploads:/app/app/static/user_images
      - user_data_files:/app/users_data_files
    depends_on:
      - postgres
      - redis
    networks:
      - datilio-net
    restart: unless-stopped

  celery_worker:
    image: datilio-backend:prod
    container_name: datilio-celery-worker
    env_file:
      - .env
      - ./backend/.env
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    volumes:
      - user_uploads:/app/app/static/user_images
      - user_data_files:/app/users_data_files
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://datilio.com}
    image: datilio-frontend:prod
    container_name: datilio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped

  frontend_admin:
    build:
      context: ./frontend_admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://datilio.com/api/v1}
    image: datilio-frontend-admin:prod
    container_name: datilio-frontend-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  user_uploads:
  user_data_files:

networks:
  datilio-net:
    driver: bridge
