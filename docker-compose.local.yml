# Local full stack — same layout as docker-compose.prod.yml, local URLs and image tags
# Usage: docker compose -f docker-compose.local.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db-local
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DEFAULT}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    networks:
      - datilio-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-local
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    networks:
      - datilio-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: datilio-backend:local
    container_name: datilio-backend-local
    env_file:
      - .env
      - ./backend/.env
    environment:
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    ports:
      - "8000:8000"
    volumes:
      - user_uploads_local:/app/app/static/user_images
      - user_data_files_local:/app/users_data_files
    depends_on:
      - postgres
      - redis
    networks:
      - datilio-net
    restart: unless-stopped

  celery_worker:
    image: datilio-backend:local
    container_name: datilio-celery-worker-local
    env_file:
      - .env
      - ./backend/.env
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    volumes:
      - user_uploads_local:/app/app/static/user_images
      - user_data_files_local:/app/users_data_files
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: datilio-frontend:local
    container_name: datilio-frontend-local
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped

  frontend_admin:
    build:
      context: ./frontend_admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: datilio-frontend-admin:local
    container_name: datilio-frontend-admin-local
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - datilio-net
    restart: unless-stopped

volumes:
  pgdata_local:
  redis_data_local:
  user_uploads_local:
  user_data_files_local:

networks:
  datilio-net:
    driver: bridge
